<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body { /* 브라우저 기본 여백 초기화 */
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #e0f7fa; /* 헤더의 배경 (옅은 파란색) */
            border: 3px dashed #006064; /* 헤더의 테두리 (파란색 점선) */
        
            padding: 0px; 
        }

        /* h1 태그에 마진과 패딩 적용 */
        h1 {
            background-color: pink; /* h1의 배경 (옅은 붉은색) */
            border: 3px solid wheat; /* h1의 테두리 (붉은색 실선) */
            text-align: center;
      
            /* 1. Padding (내부 여백) */
            /* h1의 테두리(실선) 안쪽과 글자 사이의 공간 30px. 
                이 공간은 h1의 배경색(옅은 붉은색)으로 채움. */
            padding: 30px;

            /* 2. Margin (외부 여백) */
            /* h1의 테두리(실선) 바깥쪽 공간 40px. 
                부모 요소인 헤더(점선)와 h1(실선) 사이에 투명한 간격 성성. */
            margin: 40px; 
        }
    </style>
</head>
<body>
    <h1
    
    >자기소개</h1>
    <p>안녕하세요. 컴퓨터공학과 22학번 <span class ="zzang">한준환</span>이라고 합니다.
        앞으로 한 학기 잘 부탁드립니다.
    </p>
    <h2 style="
    color: blue;
    background-color: burlywood;
    ">사용하는 언어</h2>

</body>
</html>
